# ═══════════════════════════════════════════════════════════════════════
#  Selenium UI Framework — Configuration
#
#  All values here can be overridden at runtime via Maven system properties:
#    mvn test -Dbrowser=firefox -Dheadless=true
#
#  ConfigReader checks System.getProperty() first, then this file.
# ═══════════════════════════════════════════════════════════════════════


# ── Browser ─────────────────────────────────────────────────────────────
# Supported values: chrome | firefox | edge
# DriverFactory uses this to pick the correct WebDriver implementation.
browser=chrome

# Set to true to run the browser in headless (no UI) mode.
# Recommended for CI/CD pipelines that don't have a display server.
headless=false


# ── Application Under Test ───────────────────────────────────────────────
# The URL that BaseTest.setUp() navigates to before each test method.
# Leave blank ("") to skip automatic navigation — useful when different
# tests start from different pages.
base.url=https://www.saucedemo.com


# ── Timeouts (all values in seconds) ────────────────────────────────────

# implicit.wait: How long WebDriver polls when findElement() doesn't
#   find the element immediately. Acts as a global background wait.
#   Keep small (3–5 s) to avoid masking real failures.
implicit.wait=5

# explicit.wait: Default timeout for WebDriverWait / FluentWait conditions
#   (visibility, clickability, text presence, etc.). Adjust per environment:
#   slower environments (CI, staging) may need 15–20 s.
explicit.wait=10

# page.load.timeout: Max time WebDriver waits for a page to fully load
#   after a navigation. Throws TimeoutException if exceeded.
page.load.timeout=30


# ── Polling (milliseconds) ───────────────────────────────────────────────
# How often FluentWait re-checks the wait condition between polls.
# Lower = more responsive but higher CPU usage. 500 ms is a good balance.
polling.interval=500


# ── Environment tag ─────────────────────────────────────────────────────
# Informational — appears in the ExtentReport system info section.
# Useful when running reports from multiple environments (QA, Staging, Prod).
environment=QA
