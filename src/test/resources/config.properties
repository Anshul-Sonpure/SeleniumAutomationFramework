# -------------------------------------------------------
# Selenium UI Framework - Configuration
#
# All values here can be overridden at runtime:
#   mvn test -Dbrowser=firefox -Dheadless=true
#
# ConfigReader checks System.getProperty() first, then this file.
# -------------------------------------------------------


# Browser
# Supported values: chrome | firefox | edge
browser=chrome

# Set to true to run browser without a visible window (CI/CD mode)
headless=false

# Set to true to run tests in private/incognito mode.
# Prevents password-manager popups, cached credentials, and saved form data
# from interfering with test runs.
incognito=true


# Application Under Test
# BaseTest.setUp() navigates to this URL before each test
base.url=https://www.saucedemo.com


# Timeouts (all values in seconds)

# How long WebDriver polls when an element is not found immediately
implicit.wait=5

# Timeout for explicit waits (visibility, clickability, text present, etc.)
explicit.wait=10

# Max time allowed for a page to fully load after navigation
page.load.timeout=30


# Polling interval for FluentWait (in milliseconds)
# How often the condition is re-checked between polls
polling.interval=500


# Environment label shown in the ExtentReport system info section
environment=QA


# Pause (ms) inserted after each click/type so actions are visible during recording. Set 0 to disable.
action.delay=500

# Whether to record an animated GIF during each test. Automatically disabled when headless=true.
video.enabled=true

# Frames per second for GIF capture (lower = smaller file size).
video.fps=5
